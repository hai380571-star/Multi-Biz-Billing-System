<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abdu Multi-Billing System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .bill-card { background: white; border-radius: 15px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-top: 20px; border: 1px solid #e0e0e0; }
        .bill-header { border-bottom: 3px solid #333; padding-bottom: 20px; margin-bottom: 30px; }
        
        /* Input styling */
        .form-control { border-radius: 8px; border: 1px solid #ced4da; padding: 10px; }
        .form-control:focus { border-color: #0d6efd; box-shadow: none; }

        /* Printing Logic: Sirf Invoice dikhega, baki sab gayab */
        @media print {
            .no-print, .btn, select, .input-group, label, hr { display: none !important; }
            .bill-card { border: none; box-shadow: none; width: 100%; margin: 0; padding: 0; }
            body { background: white; }
            input { border: none !important; background: transparent !important; padding: 0 !important; font-weight: bold; }
            .print-header { display: block !important; }
        }
        
        .table thead { background-color: #212529; color: white; }
        .total-box { font-size: 1.5rem; font-weight: bold; color: #d63384; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark no-print">
    <div class="container">
        <span class="navbar-brand">Abdu Billing OS</span>
        <div class="d-flex">
            <select id="coSwitch" class="form-select w-auto me-2" onchange="switchCo(this.value)">
                {% for id, details in all_cos.items() %}
                <option value="{{ id }}" {% if id == active_id %}selected{% endif %}>{{ details.name }}</option>
                {% endfor %}
                <option value="NEW">+ Add New Business</option>
            </select>
        </div>
    </div>
</nav>

<div class="container bill-card">
    <div class="bill-header d-flex justify-content-between align-items-center">
        <div>
            <h1 class="fw-bold text-uppercase m-0">{{ co.name }}</h1>
            <p class="text-muted mb-0">{{ co.addr }}</p>
        </div>
        <div class="text-end">
            <h2 class="text-primary fw-bold">INVOICE</h2>
            <p class="mb-0">Bill No: <span id="displayBillNo" class="fw-bold">{{ bill_no }}</span></p>
            <p class="small text-muted mb-0" id="dateDisplay"></p>
        </div>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <label class="form-label no-print">Customer Name</label>
            <input type="text" id="custName" class="form-control" placeholder="Name">
        </div>
        <div class="col-md-4">
            <label class="form-label no-print">Phone Number</label>
            <input type="number" id="custPhone" class="form-control" placeholder="Phone">
        </div>
        <div class="col-md-4">
            <label class="form-label no-print">Address</label>
            <input type="text" id="custAddr" class="form-control" placeholder="Location">
        </div>
    </div>

    <table class="table table-bordered align-middle" id="billTable">
        <thead>
            <tr>
                <th style="width: 50%;">Description</th>
                <th>Rate</th>
                <th>Qty</th>
                <th>Total</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>

    <div class="row justify-content-end">
        <div class="col-md-4 text-end">
            <div class="total-box">Grand Total: ₹<span id="gTotal">0</span></div>
        </div>
    </div>

    <div class="card p-3 mt-4 no-print bg-light">
        <h5>Add Item</h5>
        <div class="row g-2">
            <div class="col-md-6">
                <input type="text" id="itemName" class="form-control" placeholder="Item/Service Name">
            </div>
            <div class="col-md-2">
                <input type="number" id="itemRate" class="form-control" placeholder="Rate">
            </div>
            <div class="col-md-2">
                <input type="number" id="itemQty" class="form-control" value="1">
            </div>
            <div class="col-md-2">
                <button class="btn btn-primary w-100" onclick="addRow()">+ Add Item</button>
            </div>
        </div>
    </div>

    <button class="btn btn-success btn-lg w-100 mt-4 no-print" onclick="finalPrint()">🖨️ GENERATE & PRINT BILL</button>
</div>

<div class="modal fade no-print" id="coModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title">Create New Business</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="text" id="newName" class="form-control mb-2" placeholder="Business Name">
                <input type="text" id="newAddr" class="form-control mb-2" placeholder="Address">
                <input type="text" id="newPre" class="form-control mb-2" placeholder="Prefix (e.g. ABC)">
                <input type="number" id="newStart" class="form-control" placeholder="Starting Bill No (e.g. 1)">
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary w-100" onclick="saveNewCo()">Save & Switch</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let grandTotal = 0;
    document.getElementById('dateDisplay').innerText = "Date: " + new Date().toLocaleDateString();

    function addRow() {
        let name = document.getElementById('itemName').value;
        let rate = parseFloat(document.getElementById('itemRate').value);
        let qty = parseInt(document.getElementById('itemQty').value);

        if(!name || !rate) return alert("Bhai details toh bharo!");

        let total = rate * qty;
        grandTotal += total;

        let row = `<tr>
            <td>${name}</td>
            <td>${rate}</td>
            <td>${qty}</td>
            <td>${total}</td>
        </tr>`;

        document.querySelector("#billTable tbody").innerHTML += row;
        document.getElementById('gTotal').innerText = grandTotal;

        // Clear inputs
        document.getElementById('itemName').value = "";
        document.getElementById('itemRate').value = "";
    }

    function finalPrint() {
        // Business logic for "Cash Guest"
        if(!document.getElementById('custName').value) {
            document.getElementById('custName').value = "Walk-in Guest";
        }

        window.print();

        // Increment bill number in backend
        fetch('/bill-done', {method: 'POST'})
        .then(res => res.json())
        .then(data => {
            document.getElementById('displayBillNo').innerText = data.new_no;
        });
    }

    function switchCo(id) {
        if(id === "NEW") {
            new bootstrap.Modal(document.getElementById('coModal')).show();
            return;
        }
        fetch('/switch', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({id: id})
        }).then(() => location.reload());
    }

    function saveNewCo() {
        let data = {
            name: document.getElementById('newName').value,
            addr: document.getElementById('newAddr').value,
            prefix: document.getElementById('newPre').value,
            start: document.getElementById('newStart').value
        };
        fetch('/create-company', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        }).then(() => location.reload());
    }
</script>

</body>
</html>
